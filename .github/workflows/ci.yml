name: quality-gate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run reference quality gate
        run: python -B scripts/ci_quality_gate.py

      - name: Upload demo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: demo-report
          path: docs/demo_report.md
