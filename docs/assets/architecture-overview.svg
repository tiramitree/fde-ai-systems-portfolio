<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="60" y="64" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#142033">Enterprise AI Control Architecture</text>
  <text x="60" y="100" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#5b6778">The model is a component. Permissions, approvals, traces, audit, and evals are system boundaries.</text>
  <rect x="60" y="150" width="220" height="70" rx="10" fill="#f6f8fb" stroke="#d7dee8"/>
  <text x="98" y="193" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#142033">User / Workflow</text>
  <rect x="350" y="150" width="220" height="70" rx="10" fill="#eef7f6" stroke="#b7d8d2"/>
  <text x="397" y="193" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#173f3b">Policy Gate</text>
  <rect x="640" y="150" width="220" height="70" rx="10" fill="#eef3fb" stroke="#bfd0e9"/>
  <text x="684" y="193" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#1e3a5f">Model Gateway</text>
  <rect x="930" y="150" width="220" height="70" rx="10" fill="#f7f2ea" stroke="#e4cfaa"/>
  <text x="978" y="193" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#694b1f">Action Layer</text>
  <path d="M280 185H350" stroke="#7b8794" stroke-width="3"/>
  <path d="M570 185H640" stroke="#7b8794" stroke-width="3"/>
  <path d="M860 185H930" stroke="#7b8794" stroke-width="3"/>
  <rect x="92" y="300" width="430" height="260" rx="14" fill="#f5fbfa" stroke="#b7d8d2"/>
  <text x="128" y="344" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#173f3b">Secure Enterprise Knowledge Copilot</text>
  <text x="128" y="388" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#244d49">1. Resolve user, tenant, role</text>
  <text x="128" y="424" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#244d49">2. Filter documents before generation</text>
  <text x="128" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#244d49">3. Remove unsafe retrieved instructions</text>
  <text x="128" y="496" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#244d49">4. Answer with citations or abstain</text>
  <text x="128" y="532" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#244d49">5. Write trace, audit, eval records</text>
  <rect x="678" y="300" width="430" height="260" rx="14" fill="#f5f8fd" stroke="#bfd0e9"/>
  <text x="714" y="344" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#1e3a5f">Regulated Customer Operations Agent</text>
  <text x="714" y="388" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#294866">1. Classify workflow intent</text>
  <text x="714" y="424" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#294866">2. Search policy and case data</text>
  <text x="714" y="460" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#294866">3. Execute internal tools</text>
  <text x="714" y="496" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#294866">4. Gate side effects through approval</text>
  <text x="714" y="532" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#294866">5. Write trace, audit, eval records</text>
  <rect x="338" y="620" width="524" height="52" rx="26" fill="#142033"/>
  <text x="392" y="653" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Quality gate: health + evals + smoke tests + public release audit</text>
</svg>
